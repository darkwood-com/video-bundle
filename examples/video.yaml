# Example video definition — 3 scenes, ready to run with app:video:generate

title: Darkwood MVP Video

scenes:
  - id: intro
    title: The Forest Awakens
    description: Establishing shot of the woods at dusk.
    video_prompt: Dark forest at twilight, mist between trees, cinematic, moody.
    narration: In the heart of the woods, something stirs.
    duration: 5.0

  - id: tension
    title: Shadows Move
    description: Tension build with subtle movement in the dark.
    video_prompt: POV walking through dark forest, flickering light, uneasy atmosphere.
    narration: You are not alone here.
    duration: 4.5

  - id: reveal
    title: The Clearing
    description: Final beat — glimpse of the unknown.
    video_prompt: Clearing in the forest, single light source, figure in silhouette.
    narration: What waits in the clearing?
    duration: 6.0
